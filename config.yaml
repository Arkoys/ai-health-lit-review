sources:
  # Currently implemented sources (collector.py supports fetch_arxiv, fetch_pubmed)
  arxiv:
    enabled: true
    categories:
    - cs.AI
    - cs.LG
    - cs.CL
    - cs.CY  # Computers and Society (AI ethics, governance)
    - q-bio
    - eess.AS
    - cs.CV
    max_results_per_day: 50

  pubmed:
    enabled: true
    databases:
    - pubmed
    - pmc
    max_results_per_day: 30

  # Future sources to implement (PhD recommendations):
  # - Google Scholar (most comprehensive, advanced search operators)
  # - Web of Science / Scopus (citation tracking, impact metrics)
  # - SSRN (policy and governance working papers)
  # - ACM Digital Library (FAccT, AIES, CHI proceedings)
  # - IEEE Xplore (engineering and ethics papers)
  # - PhilPapers (AI ethics and philosophy)
  # - JSTOR (historical governance and policy scholarship)

  # Note: The "conferences" source below scrapes journal/conference sites but is NOT fully implemented yet.
  # It is kept for future development to add venue-specific scraping.
  conferences:
    enabled: true  # Implemented: NeurIPS scraper active
    sites:
    - https://proceedings.neurips.cc/
    max_results_per_day: 20
