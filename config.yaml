priority_indicators:
  venues:
  - NeurIPS
  - ICML
  - Nature Medicine
  - JAMA
  - The Lancet Digital Health
  - Medical Image Analysis
  - JAMA Network Open
  - Nature Biomedical Engineering
  - Proceedings of the National Academy of Sciences
  terms:
  - clinical trial
  - real-world
  - validation
  - prospective
  - multicenter
  - FDA
  - regulatory
  - deployment
scoring:
  keyword_match: 1.0
  priority_venue: 3.0
  priority_term: 2.0
  citation_velocity: 2.0
  recency: 1.0
  min_score_threshold: 3.0
summarization:
  max_daily_papers: 10
  summary_length: 400
  include_critique: true
  extract_methods: true
  identify_gaps: true
providers:
  openrouter:
    enabled: true
    model: stepfun/step-3.5-flash:free
  openrouter_fallback:
    enabled: true
    model: nvidia/nemotron-3-super-120b-a12b:free
  ollama:
    enabled: true
    model: llama3:8b
    base_url: http://localhost:11434
  openai:
    enabled: false
    model: gpt-4o
  gemini:
    enabled: false
    model: gemini-2.0-flash
  huggingface:
    enabled: false
    model: meta-llama/Llama-3.3-70B-Instruct
outputs:
  telegram:
    enabled: true
    channel_id: ''
  email:
    enabled: true
    to: ''
    subject: AI Health Lit Review - Daily Digest
  google_docs:
    enabled: true
    folder_id: ''
    document_title: AI Health Literature Review - Cumulative Knowledge Base
  local:
    markdown_dir: ./outputs/digests
    database: ./data/papers.db
    log_file: ./logs/processing.log
processing:
  max_workers: 3
  request_timeout: 30
  retry_attempts: 6
  user_agent: 'AI-Health-Lit-Review/1.0 (contact: you@example.com)'
